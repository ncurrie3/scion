# Cloud Build configuration for building just the harness images
# This builds on top of the existing scion-base:latest image
# Use this when you only need to update harness-specific configuration (claude, gemini, etc.)
steps:
  # Enable multi-arch builds
  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build Gemini Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-gemini'
    dir: 'image-build/gemini'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:latest'
      - '-t'
      - '$_REGISTRY/scion-gemini:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-gemini:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build Claude Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-claude'
    dir: 'image-build/claude'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:latest'
      - '-t'
      - '$_REGISTRY/scion-claude:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-claude:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build OpenCode Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-opencode'
    dir: 'image-build/opencode'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:latest'
      - '-t'
      - '$_REGISTRY/scion-opencode:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-opencode:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build Codex Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-codex'
    dir: 'image-build/codex'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:latest'
      - '-t'
      - '$_REGISTRY/scion-codex:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-codex:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 1800s # 30 minutes - harnesses are lightweight
