steps:
  # Enable multi-arch builds
  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 1. Build Scion Base Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-base'
    dir: 'image-build/scion-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '-t'
      - '$_REGISTRY/scion-base:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-base:latest'
      - '-f'
      - 'Dockerfile'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 2. Build Gemini Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-gemini'
    dir: 'image-build/gemini'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-gemini:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-gemini:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 3. Build Claude Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-claude'
    dir: 'image-build/claude'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-claude:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-claude:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 4. Build OpenCode Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-opencode'
    dir: 'image-build/opencode'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-opencode:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-opencode:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # 5. Build Codex Harness Image
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-codex'
    dir: 'image-build/codex'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/scion-base:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-codex:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-codex:latest'
      - '-f'
      - 'Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 7200s # Sets the total build timeout to 2 hours (7200 seconds)