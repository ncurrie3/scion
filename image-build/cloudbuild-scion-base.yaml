# Cloud Build configuration for building just the scion-base image
# This builds on top of the existing core-base:latest image
# Use this when you only need to update sciontool or scion-specific configuration
steps:
  # Enable multi-arch builds
  - name: 'gcr.io/cloud-builders/docker'
    id: 'setup-buildx'
    args: ['buildx', 'create', '--name', 'mybuilder', '--use']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  - name: 'gcr.io/cloud-builders/docker'
    id: 'bootstrap-buildx'
    args: ['buildx', 'inspect', '--bootstrap']
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

  # Build and push scion-base image (uses existing core-base:latest)
  - name: 'gcr.io/cloud-builders/docker'
    id: 'build-scion-base'
    args:
      - 'buildx'
      - 'build'
      - '--platform'
      - 'linux/amd64,linux/arm64'
      - '--build-arg'
      - 'BASE_IMAGE=$_REGISTRY/core-base:latest'
      - '-t'
      - '$_REGISTRY/scion-base:$SHORT_SHA'
      - '-t'
      - '$_REGISTRY/scion-base:latest'
      - '-f'
      - 'image-build/scion-base/Dockerfile'
      - '--pull'
      - '--push'
      - '.'
    env:
      - 'DOCKER_CLI_EXPERIMENTAL=enabled'

substitutions:
  _REGISTRY: 'us-central1-docker.pkg.dev/${PROJECT_ID}/public-docker'
options:
  dynamicSubstitutions: true
  machineType: 'E2_HIGHCPU_8'
timeout: 1800s # 30 minutes - much faster since core-base is pre-built
